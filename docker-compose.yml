version: '3.8'

services:
  # ── Kind control-plane ──────────────────────────────────────────────────
  kind-cluster:
    image: kindest/node:v1.30.0
    privileged: true
    volumes:
      - /var/lib/docker:/var/lib/docker
    ports:
      - "6443:6443"
    healthcheck:
      test: ["CMD", "kubectl", "cluster-info"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── LLM Operator ────────────────────────────────────────────────────────
  operator:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - KUBECONFIG=/root/.kube/config
      - LOG_LEVEL=debug
    volumes:
      - ~/.kube:/root/.kube:ro
    ports:
      - "8084:8084"   # Prometheus /metrics
      - "8081:8081"   # Health probes
    depends_on:
      kind-cluster:
        condition: service_healthy
    restart: on-failure

  # ── Prometheus ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./hack/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - operator

  # ── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=llmoperator
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
